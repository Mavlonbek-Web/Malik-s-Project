<!DOCTYPE html>
<html lang="uz">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web Layout</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

        <header id="top-logo-bar">
            <h1>Yummy Hub Logo</h1>

        </header>

        <section class="main-header">
            <h2>Welcome to our Culinary Journey</h2>

        <nav class="nav-container">
            <div class="nav-item active" id="home-link">Home</div>
            <div class="nav-item">About</div>
            <div class="nav-item">Gallery</div>
            <div class="nav-item">Menu</div>
        </nav>

        <main class="content-grid">

                <h3>About Our Cuisine</h3>
                <p>O'zbekistonning boy madaniyati va lazzatli taomlari haqida qisqacha ma'lumot.</p>
            </article>

            <aside class="sidebar">
                <div class="quick-link">Traditional Plov</div>
                <div class="quick-link">Master Classes</div>
            </aside>
        </main>

        <footer id="contact-bar">
            <p>Contact us: +998 90 123 45 67 | info@yummyhub.uz</p>
            <button id="alertBtn">Order Now</button>
        </footer>
    </div>
